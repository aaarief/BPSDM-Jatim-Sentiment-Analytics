name: BPSDM Jatim Sunday ETL Pipeline

on:
  schedule:
    # Run every Sunday at 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:
    # Allows manual triggering of the workflow from the GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests scrapetube gspread google-auth

      - name: Execute Sentiment Analysis ETL Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          python pipeline.py

      - name: Commit and push updated backup CSV data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bpsdm_gemini_sentiment_results.csv
          # Only commit if there are actual changes in the CSV
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update sentiment data [cron]"
            git pull --rebase origin main
            git push origin main
          fi
